<section class="crypto-conversion-page">
  <h2>Conversione Crypto</h2>
  <form class="crypto-form" (ngSubmit)="convertCrypto()">
    <label for="amount">Importo</label>
    <input id="amount" name="amount" type="number" [(ngModel)]="amount" min="0" required />

    <label for="fromCurrency">Da valuta</label>
    <select id="fromCurrency" name="fromCurrency" [(ngModel)]="fromCurrency">
      <option value="EUR">EUR</option>
      <option value="USD">USD</option>
    </select>

    <label for="cryptoSymbol">Criptovaluta</label>
    <select id="cryptoSymbol" name="cryptoSymbol" [(ngModel)]="cryptoSymbol">
      <option value="BTC">BTC</option>
      <option value="ETH">ETH</option>
      <option value="USDT">USDT</option>
    </select>

    <button type="submit">Converti in crypto</button>
  </form>

  <section *ngIf="conversion$ | async as conversion" class="conversion-result">
    <h3>Risultato conversione</h3>
    <p>{{ conversion.originalAmount }} {{ conversion.fromCurrency }} =&gt; {{ conversion.convertedAmount | number:'1.2-2' }} {{ conversion.toCurrency }}</p>
    <p>Tariffa applicata: {{ conversion.rate | number:'1.4-4' }}</p>
  </section>
</section>
