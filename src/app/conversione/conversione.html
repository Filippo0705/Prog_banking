<section class="conversion-page">
  <h2>Conversione Valute</h2>
  <form class="conversion-form" (ngSubmit)="convert()">
    <label for="amount">Importo</label>
    <input id="amount" name="amount" type="number" [(ngModel)]="amount" min="0" required />

    <label for="fromCurrency">Da valuta</label>
    <select id="fromCurrency" name="fromCurrency" [(ngModel)]="fromCurrency">
      <option value="EUR">EUR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
    </select>

    <label for="toCurrency">A valuta</label>
    <select id="toCurrency" name="toCurrency" [(ngModel)]="toCurrency">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
    </select>

    <button type="submit">Converti</button>
  </form>

 <section *ngIf="conversion$ | async as conversion; else noConversion" class="conversion-result">
  <h3>Risultato conversione</h3>
  <p>
    {{ conversion.originalAmount }} {{ conversion.fromCurrency }} =&gt; 
    {{ conversion.convertedAmount | number:'1.2-2' }} {{ conversion.toCurrency }}
  </p>
  <p>Tariffa applicata: {{ conversion.rate | number:'1.4-4' }}</p>
  </section>
</section>

<!-- Messaggio mostrato quando non c'è ancora nessuna conversione attiva -->
<ng-template #noConversion>
  <p class="placeholder-text">Seleziona i dati e calcola la conversione.</p>
</ng-template>
